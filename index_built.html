<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東京ドッグマップ | ドッグラン・ドッグカフェ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ヘッダー */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 56px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title span {
      font-size: 22px;
    }

    .header-count {
      font-size: 12px;
      color: #888;
      font-weight: 400;
    }

    /* フィルターバー */
    .filter-bar {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      z-index: 999;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #ddd;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
      color: #555;
    }

    .filter-btn.active {
      background: #4a90d9;
      border-color: #4a90d9;
      color: #fff;
      font-weight: 600;
    }

    .filter-btn.dogrun.active {
      background: #2e7d32;
      border-color: #2e7d32;
    }

    .filter-btn.dogcafe.active {
      background: #c2410c;
      border-color: #c2410c;
    }

    /* メインレイアウト */
    .main-container {
      display: flex;
      height: calc(100vh - 104px);
      margin-top: 104px;
    }

    /* 地図 */
    #map {
      flex: 1;
      height: 100%;
    }

    /* サイドパネル（PC用） */
    .side-panel {
      width: 340px;
      background: #fff;
      border-left: 1px solid #e0e0e0;
      overflow-y: auto;
      display: none;
    }

    @media (min-width: 768px) {
      .side-panel {
        display: block;
      }
    }

    .side-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
      color: #888;
    }

    /* スポットカード */
    .spot-card {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.1s;
    }

    .spot-card:hover {
      background: #f8f8f8;
    }

    .spot-card.active {
      background: #e8f4fd;
      border-left: 3px solid #4a90d9;
    }

    .spot-card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }

    .spot-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .spot-badge.dogrun {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .spot-badge.dogcafe {
      background: #fff3e0;
      color: #c2410c;
    }

    .spot-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      line-height: 1.4;
    }

    .spot-address {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
      line-height: 1.4;
    }

    .spot-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .spot-rating {
      font-size: 12px;
      color: #f59e0b;
      font-weight: 600;
    }

    .spot-rating-count {
      font-size: 11px;
      color: #aaa;
    }

    /* 情報ウィンドウ（地図上のポップアップ） */
    .info-window {
      max-width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    }

    .iw-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .iw-badge.dogrun {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .iw-badge.dogcafe {
      background: #fff3e0;
      color: #c2410c;
    }

    .iw-name {
      font-size: 15px;
      font-weight: 700;
      color: #222;
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .iw-address {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .iw-rating {
      font-size: 13px;
      color: #f59e0b;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .iw-hours {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .iw-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .iw-link {
      font-size: 12px;
      color: #4a90d9;
      text-decoration: none;
      padding: 3px 8px;
      border: 1px solid #4a90d9;
      border-radius: 4px;
    }

    .iw-link:hover {
      background: #4a90d9;
      color: #fff;
    }

    /* モバイル用ボトムシート */
    .bottom-sheet {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      z-index: 1000;
      max-height: 60vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    @media (max-width: 767px) {
      .bottom-sheet {
        display: block;
      }
    }

    .bottom-sheet-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 10px auto 0;
    }

    .bottom-sheet-content {
      padding: 12px 16px 24px;
    }

    .bottom-sheet-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .bottom-sheet-badge.dogrun {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .bottom-sheet-badge.dogcafe {
      background: #fff3e0;
      color: #c2410c;
    }

    .bottom-sheet-name {
      font-size: 17px;
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    .bottom-sheet-address {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .bottom-sheet-rating {
      font-size: 14px;
      color: #f59e0b;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .bottom-sheet-hours {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.7;
    }

    .bottom-sheet-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bottom-sheet-link {
      font-size: 13px;
      color: #4a90d9;
      text-decoration: none;
      padding: 6px 14px;
      border: 1.5px solid #4a90d9;
      border-radius: 6px;
    }

    /* ローディング */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 14px;
      color: #666;
      gap: 12px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<div id="loading">
  <div class="loading-spinner"></div>
  <div>地図を読み込み中...</div>
</div>

<header>
  <div class="header-title">

    東京ドッグマップ
  </div>
  <div class="header-count" id="count-display"></div>

</div>

<div class="main-container">

</div>

<div class="bottom-sheet" id="bottom-sheet">
  <div class="bottom-sheet-handle"></div>
  <div class="bottom-sheet-content" id="bottom-sheet-content"></div>
</div>

33", "website": "https://instagram.com/brilliantcafe2022", "lat": 35.6741091, "lng": 139.4032386, "rating": 4.5, "user_ratings_total": 77, "business_status": "OPERATIONAL", "opening_hours": ["月曜日: 11時00分～16時00分", "火曜日: 定休日", "水曜日: 定休日", "木曜日: 11時00分～16時00分", "金曜日: 11時00分～16時00分", "土曜日: 11時00分～16時00分", "日曜日: 11時00分～16時00分"], "category": "ドッグカフェ"}];

// ===== 状態管理 =====
let map;
let markers = [];
let infoWindow;
let currentFilter = 'all';
let activeMarker = null;
let activeCardId = null;

// ===== カテゴリ設定 =====
const CATEGORY_CONFIG = {
  'ドッグラン': {
    color: '#2e7d32',
    bgColor: '#e8f5e9',
    icon: '🌿',
    label: 'ドッグラン'
  },
  'ドッグカフェ': {
    color: '#c2410c',
    bgColor: '#fff3e0',
    icon: '☕',
    label: 'ドッグカフェ'
  }
};

// ===== 地図初期化 =====
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.6762, lng: 139.6503 },
    zoom: 12,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      {
        featureType: 'poi',
        elementType: 'labels',
        stylers: [{ visibility: 'off' }]
      }
    ]
  });

  infoWindow = new google.maps.InfoWindow();

  renderMarkers();
  renderList();
  document.getElementById('loading').style.display = 'none';
}

// ===== フィルタリング =====
function getFilteredPlaces() {
  if (currentFilter === 'all') return PLACES_DATA;
  return PLACES_DATA.filter(p => p.category === currentFilter);
}

function setFilter(filter, btn) {
  currentFilter = filter;

  // ボタンのアクティブ状態
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  renderMarkers();
  renderList();
  closeBottomSheet();
}

// ===== マーカー描画 =====
function renderMarkers() {
  // 既存マーカーを削除
  markers.forEach(m => m.marker.setMap(null));
  markers = [];

  const filtered = getFilteredPlaces();

  filtered.forEach(place => {
    const config = CATEGORY_CONFIG[place.category] || CATEGORY_CONFIG['ドッグカフェ'];

    const marker = new google.maps.Marker({
      position: { lat: place.lat, lng: place.lng },
      map: map,
      title: place.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 9,
        fillColor: config.color,
        fillOpacity: 0.9,
        strokeColor: '#fff',
        strokeWeight: 2
      }
    });

    marker.addListener('click', () => {
      showInfoWindow(place, marker);
      highlightCard(place.id);
      showBottomSheet(place);
    });

    markers.push({ marker, place });
  });

  updateCountDisplay(filtered.length);
}

// ===== 情報ウィンドウ =====
function showInfoWindow(place, marker) {
  const config = CATEGORY_CONFIG[place.category] || CATEGORY_CONFIG['ドッグカフェ'];
  const badgeClass = place.category === 'ドッグラン' ? 'dogrun' : 'dogcafe';

  const rating = place.rating > 0
    ? `<div class="iw-rating">★ ${place.rating.toFixed(1)} <span style="color:#aaa;font-weight:400;font-size:11px">(${place.user_ratings_total}件)</span></div>`
    : '';

  const hours = place.opening_hours && place.opening_hours.length > 0
    ? `<div class="iw-hours">${place.opening_hours.slice(0, 3).join('<br>')}</div>`
    : '';

  const links = [];
  if (place.website) {
    links.push(`<a class="iw-link" href="${place.website}" target="_blank" rel="noopener">公式サイト</a>`);
  }
  const mapsUrl = `https://www.google.com/maps/place/?q=place_id:${place.id}`;
  links.push(`<a class="iw-link" href="${mapsUrl}" target="_blank" rel="noopener">Googleマップ</a>`);

  const content = `
    <div class="info-window">
      <div class="iw-badge ${badgeClass}">${config.icon} ${config.label}</div>
      <div class="iw-name">${escapeHtml(place.name)}</div>
      <div class="iw-address">${escapeHtml(cleanAddress(place.address))}</div>
      ${rating}
      ${hours}
      <div class="iw-links">${links.join('')}</div>
    </div>
  `;

  infoWindow.setContent(content);
  infoWindow.open(map, marker);
  activeMarker = marker;
}

// ===== サイドパネルリスト =====
function renderList() {
  const filtered = getFilteredPlaces();
  const list = document.getElementById('spot-list');
  const header = document.getElementById('side-panel-header');

  header.textContent = `${filtered.length}件のスポット`;

  list.innerHTML = filtered.map(place => {
    const config = CATEGORY_CONFIG[place.category] || CATEGORY_CONFIG['ドッグカフェ'];
    const badgeClass = place.category === 'ドッグラン' ? 'dogrun' : 'dogcafe';
    const rating = place.rating > 0
      ? `<span class="spot-rating">★ ${place.rating.toFixed(1)}</span><span class="spot-rating-count">(${place.user_ratings_total}件)</span>`
      : '';

    return `
      <div class="spot-card" id="card-${place.id}" onclick="clickCard('${place.id}')">
        <div class="spot-card-header">
          <span class="spot-badge ${badgeClass}">${config.icon} ${config.label}</span>
          <span class="spot-name">${escapeHtml(place.name)}</span>
        </div>
        <div class="spot-address">${escapeHtml(cleanAddress(place.address))}</div>
        ${rating ? `<div class="spot-meta">${rating}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ===== カードクリック =====
function clickCard(placeId) {
  const place = PLACES_DATA.find(p => p.id === placeId);
  if (!place) return;

  // 地図を移動
  map.panTo({ lat: place.lat, lng: place.lng });
  map.setZoom(15);

  // マーカーを探して情報ウィンドウを開く
  const markerData = markers.find(m => m.place.id === placeId);
  if (markerData) {
    showInfoWindow(place, markerData.marker);
  }

  highlightCard(placeId);
}

function highlightCard(placeId) {
  if (activeCardId) {
    const prev = document.getElementById(`card-${activeCardId}`);
    if (prev) prev.classList.remove('active');
  }
  const card = document.getElementById(`card-${placeId}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  activeCardId = placeId;
}

// ===== モバイル用ボトムシート =====
function showBottomSheet(place) {
  const config = CATEGORY_CONFIG[place.category] || CATEGORY_CONFIG['ドッグカフェ'];
  const badgeClass = place.category === 'ドッグラン' ? 'dogrun' : 'dogcafe';

  const rating = place.rating > 0
    ? `<div class="bottom-sheet-rating">★ ${place.rating.toFixed(1)} <span style="color:#aaa;font-weight:400;font-size:12px">(${place.user_ratings_total}件)</span></div>`
    : '';

  const hours = place.opening_hours && place.opening_hours.length > 0
    ? `<div class="bottom-sheet-hours">${place.opening_hours.join('<br>')}</div>`
    : '';

  const links = [];
  if (place.website) {
    links.push(`<a class="bottom-sheet-link" href="${place.website}" target="_blank" rel="noopener">公式サイト</a>`);
  }
  const mapsUrl = `https://www.google.com/maps/place/?q=place_id:${place.id}`;
  links.push(`<a class="bottom-sheet-link" href="${mapsUrl}" target="_blank" rel="noopener">Googleマップで開く</a>`);

  document.getElementById('bottom-sheet-content').innerHTML = `
    <span class="bottom-sheet-badge ${badgeClass}">${config.icon} ${config.label}</span>
    <div class="bottom-sheet-name">${escapeHtml(place.name)}</div>
    <div class="bottom-sheet-address">${escapeHtml(cleanAddress(place.address))}</div>
    ${rating}
    ${hours}
    <div class="bottom-sheet-links">${links.join('')}</div>
  `;

  document.getElementById('bottom-sheet').classList.add('open');
}

function closeBottomSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
}

// ===== ユーティリティ =====
function updateCountDisplay(count) {
  document.getElementById('count-display').textContent = `${count}件`;
}

function cleanAddress(address) {
  // 「日本、」を除去
  return address.replace(/^日本、/, '');
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 地図クリックでボトムシートを閉じる
document.addEventListener('DOMContentLoaded', () => {
  // ボトムシートの外をタップで閉じる
  document.getElementById('map').addEventListener('click', closeBottomSheet);
});
</script>
