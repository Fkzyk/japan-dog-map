name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 JST 10:00 (UTC 01:00) に実行
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase DB to prevent auto-pause
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://rfcfilhqkkjmkecxzijw.supabase.co/rest/v1/spots?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Supabase response status: $STATUS"
          echo "Supabase response body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "Error: Supabase returned status $STATUS"
            exit 1
          fi
          echo "Supabase is alive and DB query succeeded."
