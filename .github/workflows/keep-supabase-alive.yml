name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://rfcfilhqkkjmkecxzijw.supabase.co/auth/v1/settings" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" )
          echo "Supabase response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: Supabase returned status $STATUS"
            exit 1
          fi
          echo "Supabase is alive."
