<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — Japan Dog Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f0f2f5; min-height: 100vh; }

    /* ヘッダー */
    #admin-header {
      background: #1a1a2e; color: white;
      padding: 0 20px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #admin-header h1 { font-size: 16px; font-weight: 700; margin: 0; }
    #logout-btn {
      padding: 7px 14px; background: rgba(255,255,255,0.12); color: white;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      font-size: 12px; cursor: pointer; transition: background 0.2s;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.2); }

    /* 管理画面 */
    #admin-section { display: none; }

    /* タブ */
    #tab-bar {
      background: white; border-bottom: 1px solid #e8e8e8;
      display: flex; padding: 0 20px; overflow-x: auto;
      scrollbar-width: none; position: sticky; top: 52px; z-index: 90;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 14px 18px; border: none; background: none;
      font-size: 13px; font-weight: 600; color: #888;
      cursor: pointer; border-bottom: 3px solid transparent;
      white-space: nowrap; transition: color 0.15s;
    }
    .tab-btn.active { color: #1a1a2e; border-bottom-color: #1a1a2e; }
    .tab-count {
      display: inline-block; background: #e74c3c; color: white;
      font-size: 10px; font-weight: 700; padding: 1px 5px;
      border-radius: 10px; margin-left: 5px;
    }

    /* 統計バー */
    #stats-bar {
      padding: 12px 20px; background: white; border-bottom: 1px solid #eee;
      font-size: 12px; color: #888; display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat-item strong { color: #1a1a2e; font-size: 14px; }

    /* 投稿リスト */
    #submission-list { padding: 16px 20px; max-width: 900px; }

    .submission-card {
      background: white; border-radius: 14px; padding: 16px 18px;
      margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      border-left: 4px solid #ddd;
    }
    .submission-card.pending  { border-left-color: #f39c12; }
    .submission-card.approved { border-left-color: #27ae60; }
    .submission-card.rejected { border-left-color: #bbb; }

    .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .card-name { font-size: 15px; font-weight: 700; color: #1a1a2e; flex: 1; line-height: 1.35; }
    .status-badge {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .status-pending  { background: #fff3cd; color: #856404; }
    .status-approved { background: #d4edda; color: #155724; }
    .status-rejected { background: #f0f0f0; color: #888; }

    .card-meta { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .card-address { font-size: 13px; color: #555; margin-bottom: 4px; }
    .card-comment { font-size: 12px; color: #777; background: #f8f8f8; padding: 6px 10px; border-radius: 8px; margin-bottom: 8px; line-height: 1.6; }
    .card-date { font-size: 11px; color: #bbb; }

    .cat-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 700; color: white;
    }
    .cat-dogrun  { background: #27ae60; }
    .cat-dogcafe { background: #e74c3c; }
    .cat-vet     { background: #8e44ad; }
    .cat-hotel   { background: #2980b9; }

    /* アクションボタン */
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .action-btn {
      padding: 7px 14px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
      text-decoration: none; display: inline-block;
    }
    .action-btn:hover { opacity: 0.82; }
    .action-btn:disabled { opacity: 0.4; cursor: default; }
    .btn-approve { background: #27ae60; color: white; }
    .btn-reject  { background: #95a5a6; color: white; }
    .btn-delete  { background: #e74c3c; color: white; }
    .btn-map     { background: #f0f4ff; color: #1a73e8; }
    .btn-edit    { background: #fff8e1; color: #e67e22; }

    /* インライン編集フォーム */
    .edit-form {
      display: none; margin-top: 12px; padding: 14px;
      background: #f9f9fb; border-radius: 10px; border: 1px solid #e8e8e8;
    }
    .edit-form.open { display: block; }
    .edit-row { margin-bottom: 10px; }
    .edit-row label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 4px; }
    .edit-input {
      width: 100%; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 13px; outline: none; box-sizing: border-box; transition: border-color 0.2s;
    }
    .edit-input:focus { border-color: #1a1a2e; }
    .edit-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-save { background: #1a1a2e; color: white; }
    .btn-cancel-edit { background: #f0f0f0; color: #888; }

    /* 空状態 */
    .empty-state { text-align: center; padding: 60px 20px; color: #bbb; font-size: 14px; }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ローディング */
    #loading-indicator { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    /* トースト */
    #admin-toast {
      display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,50,0.9); color: white;
      padding: 10px 20px; border-radius: 10px; font-size: 13px;
      z-index: 9999; white-space: nowrap;
    }

    @media (max-width: 600px) {
      #submission-list { padding: 12px; }
      .action-btn { padding: 7px 11px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div id="admin-header">
    <h1>🐕 Japan Dog Map 管理画面</h1>
    <button id="logout-btn" onclick="logout()" style="display:none;">ログアウト</button>
  </div>

  <!-- 管理画面 -->
  <div id="admin-section">
    <div id="tab-bar">
      <button class="tab-btn active" onclick="setTab('pending')" id="tab-pending">
        審査待ち <span class="tab-count" id="badge-pending" style="display:none;">0</span>
      </button>
      <button class="tab-btn" onclick="setTab('approved')" id="tab-approved">承認済み</button>
      <button class="tab-btn" onclick="setTab('rejected')" id="tab-rejected">却下済み</button>
      <button class="tab-btn" onclick="setTab('all')" id="tab-all">全て</button>
      <button class="tab-btn" onclick="setTab('reviews')" id="tab-reviews">口コミ審査</button>
      <button class="tab-btn" onclick="setTab('requests')" id="tab-requests">
        削除依頼 <span class="tab-count" id="badge-requests" style="display:none;">0</span>
      </button>
      <button class="tab-btn" onclick="setTab('overrides')" id="tab-overrides">スポット修正</button>
      <button class="tab-btn" onclick="setTab('stats')" id="tab-stats">📊 利用統計</button>
    </div>
    <div id="stats-bar">
      <span class="stat-item">審査待ち <strong id="stat-pending">-</strong>件</span>
      <span class="stat-item">承認済み <strong id="stat-approved">-</strong>件</span>
      <span class="stat-item">却下済み <strong id="stat-rejected">-</strong>件</span>
      <span style="margin-left:auto;">
        <button onclick="reloadCurrentTab()" style="background:none;border:1px solid #ddd;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#555;">再読み込み</button>
      </span>
    </div>
    <!-- 投稿一覧 -->
    <div id="submission-list">
      <div id="loading-indicator">読み込み中...</div>
    </div>
    <!-- 口コミ審査 -->
    <div id="reviews-section" style="display:none;padding:16px 20px;max-width:900px;">
      <div id="reviews-loading" style="text-align:center;padding:40px;color:#aaa;font-size:14px;">読み込み中...</div>
      <div id="reviews-admin-list"></div>
    </div>
    <!-- 削除依頼 -->
    <div id="requests-section" style="display:none;padding:16px 20px;max-width:900px;">
      <div id="requests-loading" style="text-align:center;padding:40px;color:#aaa;font-size:14px;">読み込み中...</div>
      <div id="requests-admin-list"></div>
    </div>
    <!-- 利用統計 -->
    <div id="stats-section" style="display:none;padding:16px 20px;max-width:900px;">
      <div id="stats-loading" style="text-align:center;padding:40px;color:#aaa;font-size:14px;">読み込み中...</div>
      <div id="stats-content" style="display:none;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;">
          <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
            <div style="font-size:28px;font-weight:800;color:#1a1a2e;" id="stat-users-7d">-</div>
            <div style="font-size:12px;color:#888;margin-top:4px;">ユーザー数（7日）</div>
          </div>
          <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
            <div style="font-size:28px;font-weight:800;color:#27ae60;" id="stat-views-7d">-</div>
            <div style="font-size:12px;color:#888;margin-top:4px;">スポット閲覧数（7日）</div>
          </div>
          <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
            <div style="font-size:28px;font-weight:800;color:#e67e22;" id="stat-submits-7d">-</div>
            <div style="font-size:12px;color:#888;margin-top:4px;">スポット投稿数（7日）</div>
          </div>
          <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);text-align:center;">
            <div style="font-size:28px;font-weight:800;color:#8e44ad;" id="stat-users-30d">-</div>
            <div style="font-size:12px;color:#888;margin-top:4px;">ユーザー数（30日）</div>
          </div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);">
          <h3 style="margin:0 0 16px;font-size:14px;color:#1a1a2e;">イベント種別（7日）</h3>
          <div id="stats-event-list"></div>
        </div>
      </div>
    </div>

    <!-- スポット修正管理 -->
    <div id="overrides-section" style="display:none;padding:16px 20px;max-width:900px;">
      <div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <p style="margin:0;font-size:13px;color:#888;">places.jsonのスポット情報をDB側で上書きします。閉店フラグONにするとマップから非表示になります。</p>
        <button class="action-btn btn-approve" onclick="openOverrideModal('','')">＋ 新しく修正を追加</button>
      </div>
      <div id="overrides-loading" style="text-align:center;padding:40px;color:#aaa;font-size:14px;">読み込み中...</div>
      <div id="overrides-admin-list"></div>
    </div>
  </div>

  <!-- スポット修正モーダル -->
  <div id="override-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;padding:16px;">
    <div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.25);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <h3 style="margin:0;font-size:16px;color:#1a1a2e;">✏️ スポット情報を修正</h3>
        <button onclick="closeOverrideModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;">×</button>
      </div>
      <div class="edit-row">
        <label>スポット名で検索</label>
        <input class="edit-input" id="ov-search" placeholder="スポット名を入力..." oninput="_searchSpots(this.value)" autocomplete="off">
        <div id="ov-search-results" style="display:none;background:#fff;border:1.5px solid #ddd;border-radius:8px;max-height:180px;overflow-y:auto;margin-top:4px;position:relative;z-index:10;"></div>
        <small style="color:#aaa;">選択するとスポットIDが自動入力されます</small>
      </div>
      <div class="edit-row">
        <label>スポットID <span style="color:#e74c3c;">*</span></label>
        <input class="edit-input" id="ov-spot-id" placeholder="上の検索で自動入力されます">
      </div>
      <div class="edit-row">
        <label>スポット名（変更する場合のみ）</label>
        <input class="edit-input" id="ov-name" placeholder="空欄なら変更しない">
      </div>
      <div class="edit-row">
        <label>住所（変更する場合のみ）</label>
        <input class="edit-input" id="ov-address" placeholder="空欄なら変更しない">
      </div>
      <div class="edit-row">
        <label>カテゴリ（変更する場合のみ）</label>
        <select class="edit-input" id="ov-category">
          <option value="">変更しない</option>
          <option value="dogrun">ドッグラン</option>
          <option value="dogcafe">ペット可飲食店</option>
          <option value="vet">動物病院</option>
          <option value="hotel">ペット可宿泊施設</option>
        </select>
      </div>
      <div class="edit-row">
        <label>ウェブサイトURL（変更する場合のみ）</label>
        <input class="edit-input" id="ov-website" placeholder="https://...">
      </div>
      <div class="edit-row">
        <label>電話番号（変更する場合のみ）</label>
        <input class="edit-input" id="ov-phone" placeholder="03-xxxx-xxxx">
      </div>
      <div class="edit-row">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="ov-closed" style="width:16px;height:16px;">
          <span>閉店・廃業フラグ（ONにするとマップから非表示）</span>
        </label>
      </div>
      <div class="edit-row">
        <label>管理者メモ（内部用）</label>
        <input class="edit-input" id="ov-note" placeholder="対応経緯など">
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="action-btn btn-save" style="flex:1;" onclick="saveOverride()">保存する</button>
        <button class="action-btn btn-cancel-edit" onclick="closeOverrideModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- トースト -->
  <div id="admin-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    var SUPABASE_URL = 'https://rfcfilhqkkjmkecxzijw.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmY2ZpbGhxa2tqbWtlY3h6aWp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDI4MjQsImV4cCI6MjA4NzQxODgyNH0.xtjFtJaWFWeoGRs8O_g57mDHn6ElQlEMZJN8Q0Kn6xk';
    var sb = null;
    var allSubmissions = [];
    var currentTab = 'pending';
    var CAT_LABELS = { dogrun:'ドッグラン', dogcafe:'ペット可飲食店', vet:'動物病院', hotel:'ペット可宿泊施設' };

    window.addEventListener('load', function() {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      // OAuthセッション確認 → なければログインページへ
      sb.auth.getSession().then(function(result) {
        if (!result.data.session) {
          window.location.href = '/admin-login.html';
          return;
        }
        // 管理者権限チェック
        sb.rpc('is_admin').then(function(r) {
          if (r.error || !r.data) {
            alert('管理者権限がありません。');
            sb.auth.signOut().then(function() {
              window.location.href = '/admin-login.html';
            });
            return;
          }
          showAdminSection();
          loadSubmissions();
          loadRequestsBadge();
        });
      });
    });

    // ===== ログアウト =====
    function logout() {
      sb.auth.signOut().then(function() {
        window.location.href = '/admin-login.html';
      });
    }

    function showAdminSection() {
      document.getElementById('admin-section').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'block';
    }

    // ===== 削除依頼バッジをログイン直後に取得 =====
    function loadRequestsBadge() {
      sb.rpc('admin_get_deletion_requests_v2', {})
        .then(function(result) {
          if (result.error || !result.data) return;
          var pending = result.data.filter(function(r) { return r.status === 'pending'; }).length;
          var badge = document.getElementById('badge-requests');
          badge.textContent = pending;
          badge.style.display = pending > 0 ? 'inline-block' : 'none';
        });
    }

    // ===== 投稿データ読み込み =====
    function loadSubmissions() {
      document.getElementById('loading-indicator').style.display = 'block';
      document.getElementById('submission-list').innerHTML =
        '<div id="loading-indicator" style="text-align:center;padding:40px;color:#aaa;font-size:14px;">読み込み中...</div>';

      sb.rpc('admin_get_submissions_v2', {})
        .then(function(result) {
          if (result.error) {
            document.getElementById('submission-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">⚠️</div>データの取得に失敗しました。<br>ページをリロードしてください。</div>';
            return;
          }
          allSubmissions = result.data || [];
          updateStats();
          renderList();
        });
    }

    function updateStats() {
      var counts = { pending: 0, approved: 0, rejected: 0 };
      allSubmissions.forEach(function(s) { if (counts[s.status] !== undefined) counts[s.status]++; });
      document.getElementById('stat-pending').textContent  = counts.pending;
      document.getElementById('stat-approved').textContent = counts.approved;
      document.getElementById('stat-rejected').textContent = counts.rejected;
      var badge = document.getElementById('badge-pending');
      badge.textContent = counts.pending;
      badge.style.display = counts.pending > 0 ? 'inline-block' : 'none';
    }

    // ===== タブ切り替え =====
    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById('tab-' + tab).classList.add('active');
      // セクション表示切り替え
      var isSpecial = tab === 'reviews' || tab === 'requests' || tab === 'overrides' || tab === 'stats';
      document.getElementById('submission-list').style.display  = isSpecial ? 'none' : 'block';
      document.getElementById('reviews-section').style.display  = tab === 'reviews'   ? 'block' : 'none';
      document.getElementById('requests-section').style.display = tab === 'requests'  ? 'block' : 'none';
      document.getElementById('overrides-section').style.display= tab === 'overrides' ? 'block' : 'none';
      document.getElementById('stats-section').style.display    = tab === 'stats'     ? 'block' : 'none';
      if (tab === 'reviews')   { loadAdminReviews(); return; }
      if (tab === 'requests')  { loadAdminRequests(); return; }
      if (tab === 'overrides') { loadAdminOverrides(); return; }
      if (tab === 'stats')     { loadStats(); return; }
      renderList();
    }

    function reloadCurrentTab() {
      if (currentTab === 'reviews')   { loadAdminReviews(); return; }
      if (currentTab === 'requests')  { loadAdminRequests(); return; }
      if (currentTab === 'overrides') { loadAdminOverrides(); return; }
      loadSubmissions();
    }

    // ===== 投稿一覧レンダリング =====
    function renderList() {
      var filtered = currentTab === 'all'
        ? allSubmissions
        : allSubmissions.filter(function(s) { return s.status === currentTab; });

      var list = document.getElementById('submission-list');

      if (!filtered.length) {
        var msgs = { pending:'審査待ちの投稿はありません', approved:'承認済みの投稿はありません', rejected:'却下済みの投稿はありません', all:'投稿はありません' };
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>' + (msgs[currentTab] || '') + '</div>';
        return;
      }

      list.innerHTML = filtered.map(function(s) {
        var date = new Date(s.created_at).toLocaleString('ja-JP', {
          year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
        });
        var catLabel = CAT_LABELS[s.category] || s.category;
        var statusLabel = { pending:'審査待ち', approved:'承認済み', rejected:'却下済み' }[s.status] || s.status;
        var mapUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.address);
        var sid = s.id;
        var sname = esc(s.name);

        return '<div class="submission-card ' + s.status + '" id="card-' + sid + '">' +
          '<div class="card-top">' +
            '<div class="card-name">' + sname + '</div>' +
            '<span class="status-badge status-' + s.status + '">' + statusLabel + '</span>' +
          '</div>' +
          '<div class="card-meta">' +
            '<span class="cat-badge cat-' + s.category + '">' + catLabel + '</span>' +
            '<span class="card-date">' + date + '</span>' +
          '</div>' +
          '<div class="card-address">📍 ' + esc(s.address) + '</div>' +
          (s.comment ? '<div class="card-comment">' + esc(s.comment) + '</div>' : '') +
          '<div class="card-actions">' +
            (s.status !== 'approved' ?
              '<button class="action-btn btn-approve" onclick="updateStatus(\'' + sid + '\',\'approved\')">✓ 承認する</button>' : '') +
            (s.status !== 'rejected' ?
              '<button class="action-btn btn-reject" onclick="updateStatus(\'' + sid + '\',\'rejected\')">却下する</button>' : '') +
            '<button class="action-btn btn-edit" onclick="toggleEditForm(\'' + sid + '\')">✏️ 修正</button>' +
            '<button class="action-btn btn-delete" onclick="deleteSubmission(\'' + sid + '\',\'' + sname + '\')">削除</button>' +
            '<a class="action-btn btn-map" href="' + mapUrl + '" target="_blank">地図で確認</a>' +
          '</div>' +
          '<div class="edit-form" id="edit-form-' + sid + '">' +
            '<div class="edit-row"><label>スポット名</label><input class="edit-input" id="edit-name-' + sid + '" value="' + sname + '"></div>' +
            '<div class="edit-row"><label>住所</label><input class="edit-input" id="edit-addr-' + sid + '" value="' + esc(s.address) + '"></div>' +
            '<div class="edit-row"><label>カテゴリ</label>' +
              '<select class="edit-input" id="edit-cat-' + sid + '">' +
                '<option value="dogrun"' + (s.category==='dogrun'?' selected':'') + '>ドッグラン</option>' +
                '<option value="dogcafe"' + (s.category==='dogcafe'?' selected':'') + '>ペット可飲食店</option>' +
                '<option value="vet"' + (s.category==='vet'?' selected':'') + '>動物病院</option>' +
                '<option value="hotel"' + (s.category==='hotel'?' selected':'') + '>ペット可宿泊施設</option>' +
              '</select>' +
            '</div>' +
            '<div class="edit-row"><label>コメント</label><input class="edit-input" id="edit-comment-' + sid + '" value="' + esc(s.comment||'') + '"></div>' +
            '<div class="edit-actions">' +
              '<button class="action-btn btn-save" onclick="saveEdit(\'' + sid + '\')">保存する</button>' +
              '<button class="action-btn btn-cancel-edit" onclick="toggleEditForm(\'' + sid + '\')">キャンセル</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    // ===== インライン編集 =====
    function toggleEditForm(id) {
      var form = document.getElementById('edit-form-' + id);
      form.classList.toggle('open');
    }

    function saveEdit(id) {
      var name    = document.getElementById('edit-name-' + id).value.trim();
      var address = document.getElementById('edit-addr-' + id).value.trim();
      var cat     = document.getElementById('edit-cat-' + id).value;
      var comment = document.getElementById('edit-comment-' + id).value.trim();
      if (!name || !address) { showToast('スポット名と住所は必須です'); return; }

      sb.rpc('admin_update_submission_v2', {
        submission_id: id,
        new_name: name, new_address: address,
        new_category: cat, new_comment: comment || null
      }).then(function(result) {
        if (result.error) { showToast('保存に失敗しました'); return; }
        // ローカルデータも更新
        allSubmissions = allSubmissions.map(function(s) {
          return s.id === id
            ? Object.assign({}, s, { name: name, address: address, category: cat, comment: comment })
            : s;
        });
        renderList();
        showToast('保存しました');
      });
    }

    // ===== 承認・却下 =====
    function updateStatus(id, newStatus) {
      sb.rpc('admin_update_status_v2', {
        submission_id: id,
        new_status: newStatus
      }).then(function(result) {
        if (result.error) { showToast('操作に失敗しました'); return; }
        var label = newStatus === 'approved' ? '承認' : '却下';
        allSubmissions = allSubmissions.map(function(s) {
          return s.id === id ? Object.assign({}, s, { status: newStatus }) : s;
        });
        updateStats();
        renderList();
        showToast(label + 'しました');
      });
    }

    // ===== 削除（管理者） =====
    function deleteSubmission(id, name) {
      if (!confirm('「' + name + '」を削除しますか？\nこの操作は元に戻せません。')) return;
      sb.rpc('admin_delete_submission_v2', {
        submission_id: id
      }).then(function(result) {
        if (result.error) { showToast('削除に失敗しました'); return; }
        allSubmissions = allSubmissions.filter(function(s) { return s.id !== id; });
        updateStats();
        renderList();
        showToast('削除しました');
      });
    }

    // ===== 口コミ審査 =====
    function loadAdminReviews() {
      document.getElementById('reviews-loading').style.display = 'block';
      document.getElementById('reviews-admin-list').innerHTML = '';
      sb.rpc('admin_get_reviews_v2', {})
        .then(function(result) {
          document.getElementById('reviews-loading').style.display = 'none';
          if (result.error) {
            document.getElementById('reviews-admin-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">⚠️</div>データの取得に失敗しました。</div>';
            return;
          }
          var data = result.data || [];
          if (!data.length) {
            document.getElementById('reviews-admin-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">📭</div>口コミはありません</div>';
            return;
          }
          var statusLabels = { pending:'審査待ち', approved:'承認済み', rejected:'却下済み' };
          document.getElementById('reviews-admin-list').innerHTML = data.map(function(r) {
            var date = new Date(r.created_at).toLocaleString('ja-JP', {
              year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
            });
            var stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
            var rid = r.id;
            return '<div class="submission-card ' + r.status + '" id="rev-card-' + rid + '">' +
              '<div class="card-top">' +
                '<div class="card-name">' + esc(r.spot_id) + '</div>' +
                '<span class="status-badge status-' + r.status + '">' + (statusLabels[r.status] || r.status) + '</span>' +
              '</div>' +
              '<div class="card-meta">' +
                '<span style="color:#f39c12;font-size:14px;">' + stars + '</span>' +
                '<span class="card-date">' + date + '</span>' +
              '</div>' +
              (r.comment ? '<div class="card-comment">' + esc(r.comment) + '</div>' : '<div class="card-comment" style="color:#bbb;">（コメントなし）</div>') +
              '<div class="card-actions">' +
                (r.status !== 'approved' ?
                  '<button class="action-btn btn-approve" onclick="updateReviewStatus(\'' + rid + '\',\'approved\')">✓ 承認する</button>' : '') +
                (r.status !== 'rejected' ?
                  '<button class="action-btn btn-reject" onclick="updateReviewStatus(\'' + rid + '\',\'rejected\')">却下する</button>' : '') +
              '</div>' +
            '</div>';
          }).join('');
        });
    }

    function updateReviewStatus(id, newStatus) {
      sb.rpc('admin_update_review_status_v2', {
        review_id: id, new_status: newStatus
      }).then(function(result) {
        if (result.error) { showToast('操作に失敗しました'); return; }
        var label = newStatus === 'approved' ? '承認' : '却下';
        showToast('口コミを' + label + 'しました');
        loadAdminReviews();
      });
    }

    // ===== 削除依頼管理 =====
    function loadAdminRequests() {
      document.getElementById('requests-loading').style.display = 'block';
      document.getElementById('requests-admin-list').innerHTML = '';
      sb.rpc('admin_get_deletion_requests_v2', {})
        .then(function(result) {
          document.getElementById('requests-loading').style.display = 'none';
          if (result.error) {
            document.getElementById('requests-admin-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">⚠️</div>データの取得に失敗しました。</div>';
            return;
          }
          var data = result.data || [];
          // 未対応件数をバッジ更新
          var pending = data.filter(function(r) { return r.status === 'pending'; }).length;
          var badge = document.getElementById('badge-requests');
          badge.textContent = pending;
          badge.style.display = pending > 0 ? 'inline-block' : 'none';
          if (!data.length) {
            document.getElementById('requests-admin-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">📭</div>削除依頼はありません</div>';
            return;
          }
          var statusLabels = { pending:'未対応', handled:'対応済み', rejected:'却下済み' };
          document.getElementById('requests-admin-list').innerHTML = data.map(function(r) {
            var date = new Date(r.created_at).toLocaleString('ja-JP', {
              year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
            });
            var mapUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(r.spot_name);
            var rid = r.id;
            return '<div class="submission-card ' + (r.status === 'pending' ? 'pending' : r.status === 'handled' ? 'approved' : 'rejected') + '" id="req-card-' + rid + '">' +
              '<div class="card-top">' +
                '<div class="card-name">🗺 ' + esc(r.spot_name) + '</div>' +
                '<span class="status-badge status-' + (r.status === 'pending' ? 'pending' : r.status === 'handled' ? 'approved' : 'rejected') + '">' + (statusLabels[r.status] || r.status) + '</span>' +
              '</div>' +
              '<div class="card-meta"><span class="card-date">' + date + '</span></div>' +
              '<div class="card-comment">' + esc(r.reason) + '</div>' +
              (r.contact_email ? '<div class="card-address">📧 ' + esc(r.contact_email) + '</div>' : '') +
              '<div class="card-actions">' +
                (r.status !== 'handled' ?
                  '<button class="action-btn btn-approve" onclick="updateRequestStatus(\'' + rid + '\',\'handled\')">✓ 対応済み</button>' : '') +
                (r.status !== 'rejected' ?
                  '<button class="action-btn btn-reject" onclick="updateRequestStatus(\'' + rid + '\',\'rejected\')">却下する</button>' : '') +
                '<button class="action-btn btn-edit" onclick="openOverrideModal(\'' + esc(r.spot_id) + '\',\'' + esc(r.spot_name) + '\')">✏️ スポットを修正</button>' +
                '<a class="action-btn btn-map" href="' + mapUrl + '" target="_blank">地図で確認</a>' +
              '</div>' +
            '</div>';
          }).join('');
        });
    }

    function updateRequestStatus(id, newStatus) {
      sb.rpc('admin_update_request_v2', {
        request_id: id, new_status: newStatus
      }).then(function(result) {
        if (result.error) { showToast('操作に失敗しました'); return; }
        var label = newStatus === 'handled' ? '対応済みにしました' : '却下しました';
        showToast(label);
        loadAdminRequests();
      });
    }

    // ===== 利用統計 =====
    function loadStats() {
      document.getElementById('stats-loading').style.display = 'block';
      document.getElementById('stats-content').style.display = 'none';
      var since7d  = new Date(Date.now() - 7  * 86400000).toISOString();
      var since30d = new Date(Date.now() - 30 * 86400000).toISOString();

      // 7日・30日のユーザー数とイベント集計を並行取得
      Promise.all([
        sb.from('user_events').select('device_id,event_type').gte('created_at', since7d),
        sb.from('user_events').select('device_id').gte('created_at', since30d)
      ]).then(function(results) {
        // エラーチェックを追加
        if (results[0].error || results[1].error) {
          document.getElementById('stats-loading').style.display = 'none';
          document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:40px;color:#e74c3c;font-size:14px;">データの取得に失敗しました。再読み込みしてください。</div>';
          document.getElementById('stats-content').style.display = 'block';
          return;
        }
        document.getElementById('stats-loading').style.display = 'none';
        document.getElementById('stats-content').style.display = 'block';

        var rows7d  = results[0].data || [];
        var rows30d = results[1].data || [];

        // ユニークユーザー数
        var users7d  = new Set(rows7d.map(function(r)  { return r.device_id; })).size;
        var users30d = new Set(rows30d.map(function(r) { return r.device_id; })).size;

        // イベント集計
        var views7d   = rows7d.filter(function(r) { return r.event_type === 'spot_view'; }).length;
        var submits7d = rows7d.filter(function(r) { return r.event_type === 'spot_submit'; }).length;

        document.getElementById('stat-users-7d').textContent  = users7d;
        document.getElementById('stat-views-7d').textContent  = views7d;
        document.getElementById('stat-submits-7d').textContent = submits7d;
        document.getElementById('stat-users-30d').textContent = users30d;

        // イベント種別ごとの件数
        var counts = {};
        rows7d.forEach(function(r) { counts[r.event_type] = (counts[r.event_type] || 0) + 1; });
        var labels = {
          spot_view: 'スポット閲覧', spot_favorite_add: 'お気に入り追加',
          spot_favorite_remove: 'お気に入り削除', spot_helpful: '行ったよ！',
          review_submit: '口コミ投稿', spot_report: '問題報告', spot_submit: 'スポット投稿'
        };
        var html = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; }).map(function(k) {
          return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;">' +
            '<span>' + (labels[k] || k) + '</span><strong>' + counts[k] + '件</strong></div>';
        }).join('');
        document.getElementById('stats-event-list').innerHTML = html || '<div style="color:#aaa;font-size:13px;">データなし</div>';
      });
    }

    // ===== スポット修正（spot_overrides）=====

    // places.jsonを一度だけ読み込んでキャッシュ
    var _placesCache = null;
    function _loadPlaces(cb) {
      if (_placesCache) { cb(); return; }
      fetch('/places.json').then(function(r) { return r.json(); })
        .then(function(d) { _placesCache = d; cb(); })
        .catch(function() { cb(); });
    }

    // 大文字小文字・カタカナひらがなを統一して比較
    function _normalizeText(str) {
      if (!str) return '';
      return str.toLowerCase()
        .replace(/[\u30A1-\u30F6]/g, function(c) {
          return String.fromCharCode(c.charCodeAt(0) - 0x60);
        });
    }

    // スポット名で検索して候補を表示（XSS対策：onclickではなくaddEventListenerを使用）
    function _searchSpots(q) {
      var res = document.getElementById('ov-search-results');
      if (!q) { res.style.display = 'none'; return; }
      _loadPlaces(function() {
        if (!_placesCache) return;
        var qn = _normalizeText(q);
        var hits = _placesCache.filter(function(p) {
          return p.name && _normalizeText(p.name).indexOf(qn) >= 0;
        }).slice(0, 10);
        if (!hits.length) { res.style.display = 'none'; return; }
        // innerHTML＋onclick属性方式はXSSリスクがあるためDOM操作方式に変更
        res.innerHTML = '';
        hits.forEach(function(p) {
          var div = document.createElement('div');
          div.style.cssText = 'padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0;';
          div.innerHTML = '<strong>' + esc(p.name || '') + '</strong><br>' +
            '<span style="color:#888;font-size:11px;">' + esc(p.address || '') + '</span>';
          // data属性でIDと名前を保持（onclick属性インジェクション回避）
          div.dataset.spotId   = p.place_id || '';
          div.dataset.spotName = p.name || '';
          div.addEventListener('click', function() {
            _selectSpot(this.dataset.spotId, this.dataset.spotName);
          });
          res.appendChild(div);
        });
        res.style.display = 'block';
      });
    }

    // 候補を選択 → スポットIDを自動入力
    function _selectSpot(spotId, name) {
      document.getElementById('ov-spot-id').value = spotId;
      document.getElementById('ov-search').value  = name;
      document.getElementById('ov-search-results').style.display = 'none';
    }

    // モーダルを開く（削除依頼カードから呼ばれる場合はspotId/spotNameが渡される）
    function openOverrideModal(spotId, spotName) {
      document.getElementById('ov-search').value = spotName || '';
      document.getElementById('ov-search-results').style.display = 'none';
      document.getElementById('ov-spot-id').value   = spotId || '';
      document.getElementById('ov-name').value      = spotName || '';
      document.getElementById('ov-address').value   = '';
      document.getElementById('ov-category').value  = '';
      document.getElementById('ov-website').value   = '';
      document.getElementById('ov-phone').value     = '';
      document.getElementById('ov-closed').checked  = false;
      document.getElementById('ov-note').value      = '';
      var overlay = document.getElementById('override-overlay');
      overlay.style.display = 'flex';
    }

    function closeOverrideModal() {
      document.getElementById('override-overlay').style.display = 'none';
      document.getElementById('ov-search').value = '';
      document.getElementById('ov-search-results').style.display = 'none';
    }

    function saveOverride() {
      var spotId = document.getElementById('ov-spot-id').value.trim();
      if (!spotId) { showToast('スポットIDは必須です'); return; }

      var params = {
        p_spot_id:  spotId,
        p_name:     document.getElementById('ov-name').value.trim()    || null,
        p_address:  document.getElementById('ov-address').value.trim() || null,
        p_category: document.getElementById('ov-category').value       || null,
        p_website:  document.getElementById('ov-website').value.trim() || null,
        p_phone:    document.getElementById('ov-phone').value.trim()   || null,
        p_is_closed:document.getElementById('ov-closed').checked,
        p_note:     document.getElementById('ov-note').value.trim()    || null
      };

      sb.rpc('admin_upsert_override_v2', params).then(function(result) {
        if (result.error) { console.error('saveOverride エラー:', result.error); showToast('操作に失敗しました。時間をおいて再度お試しください。'); return; }
        closeOverrideModal();
        showToast('スポット修正を保存しました');
        // overridesタブが開いていれば再読み込み
        if (currentTab === 'overrides') loadAdminOverrides();
      });
    }

    // overrideデータのキャッシュ（XSS対策でインデックス参照に使用）
    var _overridesCache = [];

    function loadAdminOverrides() {
      document.getElementById('overrides-loading').style.display = 'block';
      document.getElementById('overrides-admin-list').innerHTML = '';
      sb.rpc('admin_get_overrides_v2', {})
        .then(function(result) {
          document.getElementById('overrides-loading').style.display = 'none';
          if (result.error) {
            document.getElementById('overrides-admin-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">⚠️</div>データの取得に失敗しました。</div>';
            return;
          }
          var data = result.data || [];
          _overridesCache = data; // インデックス参照のためキャッシュ
          if (!data.length) {
            document.getElementById('overrides-admin-list').innerHTML =
              '<div class="empty-state"><div class="empty-icon">📝</div>修正済みスポットはありません</div>';
            return;
          }
          // XSS対策：onclick属性にJSONを埋め込まず、data-indexのみ格納
          document.getElementById('overrides-admin-list').innerHTML = data.map(function(ov, i) {
            var date = new Date(ov.updated_at).toLocaleString('ja-JP', {
              year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
            });
            return '<div class="submission-card ' + (ov.is_closed ? 'rejected' : 'approved') + '">' +
              '<div class="card-top">' +
                '<div class="card-name">' + esc(ov.name || '（名前変更なし）') + '</div>' +
                (ov.is_closed ? '<span class="status-badge status-rejected">閉店</span>' :
                  '<span class="status-badge status-approved">修正済み</span>') +
              '</div>' +
              '<div class="card-meta">' +
                '<code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px;">' + esc(ov.spot_id) + '</code>' +
                '<span class="card-date">' + date + '</span>' +
              '</div>' +
              (ov.address ? '<div class="card-address">📍 ' + esc(ov.address) + '</div>' : '') +
              (ov.admin_note ? '<div class="card-comment">📝 ' + esc(ov.admin_note) + '</div>' : '') +
              '<div class="card-actions">' +
                '<button class="action-btn btn-edit" data-override-index="' + i + '">✏️ 編集</button>' +
                '<button class="action-btn btn-delete" onclick="deleteOverride(\'' + esc(ov.spot_id) + '\')">削除</button>' +
              '</div>' +
            '</div>';
          }).join('');
          // HTML生成後にaddEventListenerを付与（onclick属性インジェクション回避）
          document.getElementById('overrides-admin-list')
            .querySelectorAll('[data-override-index]')
            .forEach(function(btn) {
              btn.addEventListener('click', function() {
                editOverride(_overridesCache[parseInt(this.dataset.overrideIndex, 10)]);
              });
            });
        });
    }

    // 既存overrideを編集フォームに展開
    function editOverride(ov) {
      document.getElementById('ov-spot-id').value   = ov.spot_id || '';
      document.getElementById('ov-name').value      = ov.name    || '';
      document.getElementById('ov-address').value   = ov.address || '';
      document.getElementById('ov-category').value  = ov.category|| '';
      document.getElementById('ov-website').value   = ov.website || '';
      document.getElementById('ov-phone').value     = ov.phone   || '';
      document.getElementById('ov-closed').checked  = !!ov.is_closed;
      document.getElementById('ov-note').value      = ov.admin_note || '';
      document.getElementById('override-overlay').style.display = 'flex';
    }

    function deleteOverride(spotId) {
      if (!confirm('「' + spotId + '」の修正データを削除しますか？\nスポット情報がplaces.jsonの元データに戻ります。')) return;
      sb.rpc('admin_delete_override_v2', {
        p_spot_id: spotId
      }).then(function(result) {
        if (result.error) { showToast('削除に失敗しました'); return; }
        showToast('修正データを削除しました');
        loadAdminOverrides();
      });
    }

    // ===== トースト通知 =====
    function showToast(msg) {
      var t = document.getElementById('admin-toast');
      t.textContent = msg; t.style.display = 'block';
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(function() { t.style.display = 'none'; }, 2500);
    }

    // HTMLエスケープ（シングルクォート含む全5文字をエスケープ）
    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>
