<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Maps API Test</title>
  <style>
    #map { width: 100%; height: 500px; }
  </style>
</head>
<body>
  <h1>Maps API Test</h1>
  <div id="map"></div>
  <script>
    function initMap() {
      var map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 35.6762, lng: 139.6503 },
        zoom: 11
      });
      document.title = 'MAP LOADED OK';
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBnuKUnr6GNYY1QbiL_evpkNv60TvLeGU4&callback=initMap" async defer></script>
</body>
</html>
